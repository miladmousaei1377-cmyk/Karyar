name: Android CI/CD

on:
  push:
    branches: [ "main", "claude/**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/karyar-debug.apk
          cp app/build/outputs/apk/release/app-release.apk out/karyar.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: karyar-debug-apk
          path: out/karyar-debug.apk
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: karyar-release-apk
          path: out/karyar.apk
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/') || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Prepare APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk out/karyar.apk

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1-latest
          name: "Karyar v1.1 (ШўШ®ШұЫҢЩҶ ЩҶШіШ®ЩҮ)"
          body: |
            ## Karyar - Щ…ШҜЫҢШұЫҢШӘ Ъ©Ш§ШұЩҮШ§ЫҢ ШұЩҲШІШ§ЩҶЩҮ
            > Ш§ЫҢЩҶ release ШЁШ§ ЩҮШұ push Ш¬ШҜЫҢШҜ ШЁЩҮвҖҢШұЩҲШІ Щ…ЫҢвҖҢШҙЩҲШҜ.

            ### ЩҲЫҢЪҳЪҜЫҢвҖҢЩҮШ§ЫҢ ЩҶШіШ®ЩҮ Ыұ.Ыұ:
            - ШөЩҒШӯЩҮ Ш§ШөЩ„ЫҢ ШЁШ§ Ш·ШұШ§ШӯЫҢ Ш¬ШҜЫҢШҜ ЩҲ ЩҶЩҲШ§Шұ ЩҫЫҢШҙШұЩҒШӘ
            - ШөЩҒШӯЩҮ Ш®ЩҲШҙвҖҢШўЩ…ШҜЪҜЩҲЫҢЫҢ (Onboarding) ШЁШұШ§ЫҢ ЩҶШөШЁ Ш§ЩҲЩ„
            - ЪҶЩҶШҜ Ш§ЩҶШӘШ®Ш§ШЁЫҢ Ъ©Ш§ШұЩҮШ§ (Long Press) ШЁШ§ ЪҜШІЫҢЩҶЩҮ Ш§ЩҶШ¬Ш§Щ… ШҙШҜ / ШӯШ°ЩҒ
            - ЩҫШі Ш§ШІ Ш§ЩҶШ¬Ш§Щ… ШҙШҜШҢ Ш®ЩҲШҜЪ©Ш§Шұ ШЁЩҮ ШӘШЁ Ш§ЩҶШ¬Ш§Щ…вҖҢШҙШҜЩҮвҖҢЩҮШ§ Щ…ЫҢвҖҢШұЩҲШҜ
            - ШӘЩӮЩҲЫҢЩ… ШҙЩ…ШіЫҢ ШҜШұ ШӘЩ…Ш§Щ… ШӘШ§ШұЫҢШ®вҖҢЩҮШ§
            - ШӯШ§Щ„ШӘ ШӘШ§ШұЫҢЪ© ЩҲ ШұЩҲШҙЩҶ ШЁШҜЩҲЩҶ reload
            - ЫҢШ§ШҜШўЩҲШұ ЩҮЩҲШҙЩ…ЩҶШҜ ШЁШ§ Ш§Ш№Щ„Ш§ЩҶ
            - ШўЩ…Ш§Шұ ЩҲ ЪҜШІШ§ШұШҙвҖҢЪҜЫҢШұЫҢ + Ш°Ш®ЫҢШұЩҮ ЩҒШ§ЫҢЩ„ Щ…ШӘЩҶШҢ Ш§Ъ©ШіЩ„ ЩҲ PDF
            - ЩҫШҙШӘЫҢШЁШ§ЩҶЫҢ Ъ©Ш§Щ…Щ„ Ш§ШІ ЩҒШ§ШұШіЫҢ (RTL)

            ### ЩҶШӯЩҲЩҮ ЩҶШөШЁ:
            Ыұ. ЩҒШ§ЫҢЩ„ **karyar.apk** ШұШ§ ШҜШ§ЩҶЩ„ЩҲШҜ Ъ©ЩҶЫҢШҜ
            ЫІ. ШҜШұ ШӘЩҶШёЫҢЩ…Ш§ШӘ вҶ’ Ш§Щ…ЩҶЫҢШӘШҢ В«ЩҶШөШЁ Ш§ШІ Щ…ЩҶШ§ШЁШ№ ЩҶШ§ШҙЩҶШ§Ш®ШӘЩҮВ» ШұШ§ ЩҒШ№Ш§Щ„ Ъ©ЩҶЫҢШҜ
            Ыі. ЩҒШ§ЫҢЩ„ APK ШұШ§ ШЁШ§ШІ Ъ©ШұШҜЩҮ ЩҲ ЩҶШөШЁ Ъ©ЩҶЫҢШҜ
          files: out/karyar.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
