name: Android CI/CD

on:
  push:
    branches: [ "main", "claude/**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/karland-debug.apk
          cp app/build/outputs/apk/release/app-release.apk out/karland.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: karland-debug-apk
          path: out/karland-debug.apk
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: karland-release-apk
          path: out/karland.apk
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/') || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Prepare APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk out/karland.apk

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1-latest
          name: "Karland v1.1 (آخرین نسخه)"
          body: |
            ## Karland - مدیریت کارهای روزانه
            > این release با هر push جدید به‌روز می‌شود.

            ### ویژگی‌های نسخه ۱.۱:
            - صفحه اصلی با طراحی جدید و نوار پیشرفت
            - صفحه خوش‌آمدگویی (Onboarding) برای نصب اول
            - چند انتخابی کارها (Long Press) با گزینه انجام شد / حذف
            - پس از انجام شد، خودکار به تب انجام‌شده‌ها می‌رود
            - تقویم شمسی در تمام تاریخ‌ها
            - حالت تاریک و روشن بدون reload
            - یادآور هوشمند با اعلان
            - آمار و گزارش‌گیری + ذخیره فایل متن، اکسل و PDF
            - پشتیبانی کامل از فارسی (RTL)

            ### نحوه نصب از کافه‌بازار:
            اپلیکیشن را از کافه‌بازار جستجو و نصب کنید.
          files: out/karland.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
