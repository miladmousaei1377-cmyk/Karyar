name: Build Android Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle
        run: chmod +x gradlew
        continue-on-error: true # Just in case gradlew is missing or permissions are set differently

      - name: Build with Gradle
        run: gradle assembleDebug # We can run standard gradle in environments where gradlew might not be configured, or use ./gradlew if available

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Karyar-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
