name: Android CI/CD

on:
  push:
    branches: [ "main", "claude/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: karyar-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: karyar-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 14

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Ъ©Ш§ШұЫҢШ§Шұ ${{ steps.version.outputs.version }}
          body: |
            ## Ъ©Ш§ШұЫҢШ§Шұ - Щ…ШҜЫҢШұЫҢШӘ Ъ©Ш§ШұЩҮШ§ЫҢ ШұЩҲШІШ§ЩҶЩҮ

            ### ЩҲЫҢЪҳЪҜЫҢвҖҢЩҮШ§ЫҢ Ш§ЫҢЩҶ ЩҶШіШ®ЩҮ:
            - Щ…ШҜЫҢШұЫҢШӘ Ъ©Ш§ШұЩҮШ§ЫҢ ШұЩҲШІШ§ЩҶЩҮ ШЁШ§ ШҜШіШӘЩҮвҖҢШЁЩҶШҜЫҢ ЩҲ Ш§ЩҲЩ„ЩҲЫҢШӘвҖҢШЁЩҶШҜЫҢ
            - ЫҢШ§ШҜШўЩҲШұ ЩҮЩҲШҙЩ…ЩҶШҜ ШЁШ§ AlarmManager
            - ЩҫШҙШӘЫҢШЁШ§ЩҶЫҢ Ш§ШІ ШӯШ§Щ„ШӘ ШӘШ§ШұЫҢЪ©
            - ШўЩ…Ш§Шұ ЩҲ ЪҜШІШ§ШұШҙвҖҢЩҮШ§ЫҢ Ъ©Ш§Щ…Щ„
            - ЩҫШҙШӘЫҢШЁШ§ЩҶЫҢ Ъ©Ш§Щ…Щ„ Ш§ШІ ШІШЁШ§ЩҶ ЩҒШ§ШұШіЫҢ (RTL)

            ### ЩҶШӯЩҲЩҮ ЩҶШөШЁ:
            Ыұ. ЩҒШ§ЫҢЩ„ APK ШұШ§ ШҜШ§ЩҶЩ„ЩҲШҜ Ъ©ЩҶЫҢШҜ
            ЫІ. ЩҶШөШЁ Ш§ШІ Щ…ЩҶШ§ШЁШ№ ЩҶШ§ШҙЩҶШ§Ш®ШӘЩҮ ШұШ§ ШҜШұ ШӘЩҶШёЫҢЩ…Ш§ШӘ ШҜШіШӘЪҜШ§ЩҮ ЩҒШ№Ш§Щ„ Ъ©ЩҶЫҢШҜ
            Ыі. ЩҒШ§ЫҢЩ„ APK ШұШ§ ЩҶШөШЁ Ъ©ЩҶЫҢШҜ
          files: |
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
