name: Android CI/CD

on:
  push:
    branches: [ "main", "claude/**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/karyar-debug.apk
          cp app/build/outputs/apk/release/app-release.apk out/karyar.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: karyar-debug-apk
          path: out/karyar-debug.apk
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: karyar-release-apk
          path: out/karyar.apk
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk out/karyar-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "کاریار ${{ github.ref_name }}"
          body: |
            ## کاریار - مدیریت کارهای روزانه

            ### ویژگی‌های این نسخه:
            - صفحه اصلی با طراحی جدید و پیشرفت‌نما
            - چند انتخابی کارها (Long Press) با گزینه انجام شد / حذف
            - تقویم شمسی (جلالی) در تمام تاریخ‌ها
            - حالت تاریک و روشن بدون reload صفحه
            - یادآور هوشمند با اعلان
            - آمار و گزارش‌گیری
            - خروجی متن، اکسل و PDF
            - پشتیبانی کامل از زبان فارسی (RTL)

            ### نحوه نصب:
            ۱. فایل **karyar-${{ github.ref_name }}.apk** را دانلود کنید
            ۲. در تنظیمات گوشی، «نصب از منابع ناشناخته» را فعال کنید
            ۳. فایل APK را باز کرده و نصب کنید
          files: out/karyar-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
